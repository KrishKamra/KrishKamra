name: Update AI Dashboard

permissions:
  contents: write

on:
  schedule:
    - cron: "0 */1 * * *"   # every 1 hour
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # IMPORTANT for commit history

      - name: Install jq (JSON parser)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch GitHub Stats
        run: |
          curl -s https://api.github.com/users/KrishKamra > data.json

          REPOS=$(jq '.public_repos' data.json)
          FOLLOWERS=$(jq '.followers' data.json)

          # Better approximations
          COMMITS=$(git rev-list --count HEAD)
          STARS=0

          echo "Repos: $REPOS"
          echo "Followers: $FOLLOWERS"
          echo "Commits: $COMMITS"

          # Create fresh temp file (prevents replacement bugs)
          cp assets/dashboard.svg assets/dashboard.tmp.svg

          sed -i "s/{{REPOS}}/$REPOS/g" assets/dashboard.tmp.svg
          sed -i "s/{{FOLLOWERS}}/$FOLLOWERS/g" assets/dashboard.tmp.svg
          sed -i "s/{{STARS}}/$STARS/g" assets/dashboard.tmp.svg
          sed -i "s/{{COMMITS}}/$COMMITS/g" assets/dashboard.tmp.svg

          mv assets/dashboard.tmp.svg assets/dashboard.svg

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add assets/dashboard.svg
          git commit -m "Auto-update dashboard" || echo "No changes"

          
          git pull --rebase origin main

          git push
