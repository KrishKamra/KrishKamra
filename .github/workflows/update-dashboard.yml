name: Update AI Dashboard

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch GitHub Stats
        run: |
          curl -s https://api.github.com/users/KrishKamra > data.json

          REPOS=$(jq '.public_repos' data.json)
          FOLLOWERS=$(jq '.followers' data.json)
          COMMITS=$(git rev-list --count HEAD)
          STARS=0

          cp assets/dashboard.svg assets/dashboard.tmp.svg

          sed -i "s/{{REPOS}}/$REPOS/g" assets/dashboard.tmp.svg
          sed -i "s/{{FOLLOWERS}}/$FOLLOWERS/g" assets/dashboard.tmp.svg
          sed -i "s/{{STARS}}/$STARS/g" assets/dashboard.tmp.svg
          sed -i "s/{{COMMITS}}/$COMMITS/g" assets/dashboard.tmp.svg

          mv assets/dashboard.tmp.svg assets/dashboard.svg

      - name: Commit and Push Changes (robust)
        run: |
          set -e  # Exit on any error

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git checkout main

          PUSH_SUCCESS=false
          for i in 1 2 3; do
            # Fetch latest from remote
            git fetch origin main
            
            # Rebase your changes on top of remote (not hard reset)
            git rebase origin/main
            
            # Stage and commit changes
            git add assets/dashboard.svg
            git commit -m "Auto-update dashboard" || echo "No changes to commit"
            
            # Push immediately after commit
            if git push origin main; then
              PUSH_SUCCESS=true
              echo "Successfully pushed on attempt $i"
              break
            else
              if [ $i -lt 3 ]; then
                echo "Push attempt $i failed. Retrying in 5 seconds..."
                sleep 5
                # Reset to remote for next attempt
                git reset --hard origin/main
              fi
            fi
          done

          if [ "$PUSH_SUCCESS" = false ]; then
            echo "Failed to push after 3 attempts"
            exit 1
          fi
