name: Update AI Dashboard

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

jobs:
  update-svg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install jq (JSON parser)
        run: sudo apt-get install jq

      - name: Fetch GitHub Stats
        run: |
          curl -s https://api.github.com/users/KrishKamra > data.json

          REPOS=$(jq '.public_repos' data.json)
          FOLLOWERS=$(jq '.followers' data.json)

          # Optional enhancements
          STARS=$(git ls-files | wc -l)
          COMMITS=$(git rev-list --count HEAD)

          # Replace placeholders safely
          sed -i "s/{{REPOS}}/$REPOS/g" assets/dashboard.svg
          sed -i "s/{{FOLLOWERS}}/$FOLLOWERS/g" assets/dashboard.svg
          sed -i "s/{{STARS}}/$STARS/g" assets/dashboard.svg
          sed -i "s/{{COMMITS}}/$COMMITS/g" assets/dashboard.svg

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add assets/dashboard.svg
          git commit -m "Auto-update dashboard" || echo "No changes"
          git push
