<svg fill="none" width="800" height="120" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .container {
          background-color: #0A192F;
          border: 1.5px solid #00F7FF;
          border-radius: 6px;
          padding: 24px 30px;
          text-align: center;
          font-family: 'Fira Code', monospace, monospace;
          box-sizing: border-box;
          box-shadow: 0 0 10px rgba(0, 247, 255, 0.15);
        }
        .quote {
          color: #FFFFFF;
          font-size: 16px;
          font-style: italic;
          line-height: 1.5;
          margin: 0;
        }
        .highlight {
          color: #FF0844;
          font-style: normal;
          font-weight: bold;
        }
        .cyan {
          color: #00F7FF;
        }
      </style>
      <div class="container">
        <p class="quote">
          <span class="cyan">"</span>Understanding intelligence requires <span class="highlight">curiosity</span>, <span class="highlight">mathematics</span>, <span class="highlight">experimentation</span>, and <span class="highlight">relentless iteration</span>.<span class="cyan">"</span>
        </p>
      </div>
    </div>
  </foreignObject>
</svg>
