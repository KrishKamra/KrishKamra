<svg width="1200" height="320" viewBox="0 0 1200 320"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#081321"/>
<stop offset="50%" stop-color="#0A192F"/>
<stop offset="100%" stop-color="#05070F"/>
</linearGradient>

<linearGradient id="line" x1="0%" x2="100%">
<stop offset="0%" stop-color="#00F7FF"/>
<stop offset="50%" stop-color="#FF0844"/>
<stop offset="100%" stop-color="#F107A3"/>
</linearGradient>

<filter id="cyanGlow">
<feGaussianBlur stdDeviation="3" result="blur"/>
<feMerge>
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>

<filter id="redGlow">
<feGaussianBlur stdDeviation="4"/>
</filter>

</defs>

<!-- Background -->

<rect width="1200" height="320" fill="url(#bg)" rx="18"/>

<!-- Grid -->

<g opacity="0.12">

<path d="M0 40H1200"/>
<path d="M0 80H1200"/>
<path d="M0 120H1200"/>
<path d="M0 160H1200"/>
<path d="M0 200H1200"/>
<path d="M0 240H1200"/>
<path d="M0 280H1200"/>

<path d="M80 0V320"/>
<path d="M160 0V320"/>
<path d="M240 0V320"/>
<path d="M320 0V320"/>
<path d="M400 0V320"/>
<path d="M480 0V320"/>
<path d="M560 0V320"/>
<path d="M640 0V320"/>
<path d="M720 0V320"/>
<path d="M800 0V320"/>
<path d="M880 0V320"/>
<path d="M960 0V320"/>
<path d="M1040 0V320"/>
<path d="M1120 0V320"/>

<g stroke="#00F7FF">
<path d="M0 40H1200"/>
<path d="M0 80H1200"/>
<path d="M0 120H1200"/>
<path d="M0 160H1200"/>
<path d="M0 200H1200"/>
<path d="M0 240H1200"/>
<path d="M0 280H1200"/>
</g>

</g>

<!-- Scan Line -->

<rect x="-1200" y="0" width="250" height="320"
fill="url(#line)" opacity="0.07">

<animate attributeName="x"
values="-250;1200"
dur="5s"
repeatCount="indefinite"/>

</rect>

<!-- Title -->

<text x="60"
y="70"
fill="#FFFFFF"
font-size="36"
font-family="monospace"
font-weight="bold">

AI CONTROL CENTER

</text>

<text
x="60"
y="105"
fill="#00F7FF"
font-size="16"
font-family="monospace">

Machine Learning • Intelligent Systems • Research

</text>

<!-- Neural Network -->

<g stroke="url(#line)" stroke-width="2" opacity="0.8">

<line x1="720" y1="70" x2="840" y2="120"/>
<line x1="720" y1="70" x2="920" y2="70"/>
<line x1="840" y1="120" x2="980" y2="160"/>
<line x1="920" y1="70" x2="1040" y2="120"/>
<line x1="980" y1="160" x2="1080" y2="90"/>
<line x1="840" y1="120" x2="1040" y2="120"/>
<line x1="1040" y1="120" x2="1120" y2="180"/>

</g>

<!-- Nodes -->

<g filter="url(#cyanGlow)">

<circle cx="720" cy="70" r="8" fill="#00F7FF"/>

<circle cx="840" cy="120" r="8" fill="#00F7FF"/>

<circle cx="920" cy="70" r="8" fill="#00F7FF"/>

<circle cx="980" cy="160" r="8" fill="#00F7FF"/>

<circle cx="1040" cy="120" r="8" fill="#FF0844"/>

<circle cx="1080" cy="90" r="8" fill="#F107A3"/>

<circle cx="1120" cy="180" r="8" fill="#00F7FF"/>

</g>

<!-- AI Core -->

<circle cx="930" cy="240"
r="24"
fill="#FF0844"
filter="url(#redGlow)">

<animate attributeName="r"
values="24;30;24"
dur="2s"
repeatCount="indefinite"/>

</circle>

<circle cx="930" cy="240"
r="8"
fill="#FFFFFF">

<animate attributeName="opacity"
values="1;.3;1"
dur="2s"
repeatCount="indefinite"/>

</circle>

<text
x="930"
y="286"
text-anchor="middle"
fill="#F107A3"
font-size="14"
font-family="monospace">

AI CORE

</text>

<!-- Data Packets -->

<circle r="4" fill="#00F7FF">

<animateMotion
dur="3s"
repeatCount="indefinite"

path="M720 70 L840 120 L980 160 L1040 120"/>

</circle>

<circle r="4" fill="#FF0844">

<animateMotion
dur="2.5s"
repeatCount="indefinite"

path="M920 70 L1040 120 L1120 180"/>

</circle>

<!-- Terminal -->

<rect
x="60"
y="150"
width="460"
height="120"
rx="12"
fill="#09101B"
stroke="#00F7FF"
stroke-width="1"/>

<text
x="80"
y="180"
fill="#00F7FF"
font-family="monospace"
font-size="15">

&gt; SYSTEM STATUS

</text>

<text
x="80"
y="205"
fill="#FFFFFF"
font-family="monospace"
font-size="14">

AI Research ............ ONLINE

</text>

<text
x="80"
y="228"
fill="#FFFFFF"
font-family="monospace"
font-size="14">

Deep Learning ......... ACTIVE

</text>

<text
x="80"
y="251"
fill="#FFFFFF"
font-family="monospace"
font-size="14">

Current Mode .......... BUILDING

</text>

<!-- Particles -->

<g>

<circle cx="120" cy="40" r="2" fill="#00F7FF">
<animate attributeName="cy"
values="40;20;40"
dur="3s"
repeatCount="indefinite"/>
</circle>

<circle cx="250" cy="290" r="2" fill="#FF0844">
<animate attributeName="cy"
values="290;260;290"
dur="4s"
repeatCount="indefinite"/>
</circle>

<circle cx="560" cy="80" r="2" fill="#F107A3">
<animate attributeName="cy"
values="80;50;80"
dur="5s"
repeatCount="indefinite"/>
</circle>

<circle cx="1180" cy="50" r="2" fill="#00F7FF">
<animate attributeName="cy"
values="50;20;50"
dur="3.5s"
repeatCount="indefinite"/>
</circle>

</g>

<!-- Border -->

<rect
x="2"
y="2"
width="1196"
height="316"
rx="18"
fill="none"
stroke="url(#line)"
stroke-width="2"/>

</svg>
