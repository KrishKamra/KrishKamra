<svg width="950" height="520" viewBox="0 0 950 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#090D16"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>

    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>

    <linearGradient id="magentaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0844"/>
      <stop offset="100%" stop-color="#FFB199"/>
    </linearGradient>

    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F107A3"/>
      <stop offset="100%" stop-color="#7B2CBF"/>
    </linearGradient>

    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.8"/>
    </linearGradient>

    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="magentaGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <style>
      .title-text {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 6px;
        fill: #FFFFFF;
      }
      .label-text {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        fill: #94A3B8;
      }
      .value-text {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #F8FAFC;
      }
      .pill-text {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 13px;
        font-weight: 500;
        fill: #E2E8F0;
      }
      .flow-line {
        stroke-dasharray: 6 6;
        animation: dash 30s linear infinite;
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -1000;
        }
      }
    </style>
  </defs>

  <rect width="950" height="520" rx="20" fill="url(#bg)"/>

  <rect x="1.5" y="1.5" width="947" height="517" rx="18.5" fill="none" stroke="#334155" stroke-width="1"/>
  <rect x="5" y="5" width="940" height="510" rx="15" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" stroke-opacity="0.3"/>

  <g stroke="#1E293B" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="130" x2="950" y2="130"/>
    <line x1="0" y1="180" x2="950" y2="180"/>
    <line x1="0" y1="360" x2="950" y2="360"/>
    <line x1="170" y1="0" x2="170" y2="520"/>
    <line x1="370" y1="0" x2="370" y2="520"/>
    <line x1="580" y1="0" x2="580" y2="520"/>
    <line x1="780" y1="0" x2="780" y2="520"/>
  </g>

  <circle cx="90" cy="80" r="1.5" fill="#00F2FE" opacity="0.6">
    <animate attributeName="cy" values="80;50;80" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="100" r="2" fill="#FF0844" opacity="0.5">
    <animate attributeName="cy" values="100;130;100" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="420" r="1.5" fill="#00F2FE" opacity="0.4">
    <animate attributeName="cx" values="120;150;120" dur="8s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.25">
    <line x1="170" y1="180" x2="475" y2="360" stroke="#00F2FE" stroke-width="1.5"/>
    <line x1="370" y1="130" x2="475" y2="360" stroke="#FF0844" stroke-width="1.5"/>
    <line x1="580" y1="180" x2="475" y2="360" stroke="#00F2FE" stroke-width="1.5"/>
    <line x1="780" y1="130" x2="475" y2="360" stroke="#FF0844" stroke-width="1.5"/>
  </g>

  <g stroke-width="2" opacity="0.8">
    <path d="M 170 180 L 370 130" stroke="url(#cyanGrad)" class="flow-line"/>
    <path d="M 370 130 L 580 180" stroke="url(#pinkGrad)" class="flow-line"/>
    <path d="M 580 180 L 780 130" stroke="url(#cyanGrad)" class="flow-line"/>
  </g>

  <circle r="4" fill="#00F2FE" filter="url(#cyanGlow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M 170 180 L 370 130 L 580 180 L 780 130"/>
  </circle>
  <circle r="3" fill="#FF0844" filter="url(#magentaGlow)">
    <animateMotion dur="4s" begin="2s" repeatCount="indefinite" path="M 170 180 L 370 130 L 580 180 L 780 130"/>
  </circle>

  <g id="node1" filter="url(#softShadow)">
    <circle cx="170" cy="180" r="52" fill="#0F172A" stroke="#00F2FE" stroke-width="2" filter="url(#cyanGlow)"/>
    <circle cx="170" cy="180" r="44" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="170" y="172" text-anchor="middle" class="label-text">Projects</text>
    <text x="170" y="198" text-anchor="middle" class="value-text">12+</text>
  </g>

  <g id="node2" filter="url(#softShadow)">
    <circle cx="370" cy="130" r="52" fill="#0F172A" stroke="#FF0844" stroke-width="2" filter="url(#magentaGlow)"/>
    <circle cx="370" cy="130" r="44" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="370" y="122" text-anchor="middle" class="label-text">Focus</text>
    <text x="370" y="148" text-anchor="middle" class="value-text" fill="#FFB199">AI/ML</text>
  </g>

  <g id="node3" filter="url(#softShadow)">
    <circle cx="580" cy="180" r="52" fill="#0F172A" stroke="#00F2FE" stroke-width="2" filter="url(#cyanGlow)"/>
    <circle cx="580" cy="180" r="44" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="580" y="172" text-anchor="middle" class="label-text">Status</text>
    <text x="580" y="196" text-anchor="middle" class="value-text" font-size="16">Learning</text>
  </g>

  <g id="node4" filter="url(#softShadow)">
    <circle cx="780" cy="130" r="52" fill="#0F172A" stroke="#FF0844" stroke-width="2" filter="url(#magentaGlow)"/>
    <circle cx="780" cy="130" r="44" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="780" y="122" text-anchor="middle" class="label-text">Mode</text>
    <text x="780" y="148" text-anchor="middle" class="value-text" fill="#FFB199">Build</text>
  </g>

  <g id="core-engine" filter="url(#softShadow)">
    <circle cx="475" cy="360" r="48" fill="none" stroke="#F107A3" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="36;58;36" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="475" cy="360" r="36" fill="#0F172A" stroke="url(#pinkGrad)" stroke-width="2.5" filter="url(#magentaGlow)"/>
    <circle cx="475" cy="360" r="26" fill="url(#pinkGrad)" opacity="0.2"/>
    <circle cx="475" cy="360" r="8" fill="#FFFFFF"/>

    <text x="475" y="420" text-anchor="middle" class="label-text" fill="#F107A3" font-size="12">CORE ENGINE</text>
    <text x="475" y="436" text-anchor="middle" class="label-text" font-size="9" opacity="0.6">Intelligence Active</text>
  </g>

  <g id="bottom-cards" filter="url(#softShadow)">
    <g transform="translate(70, 452)">
      <rect width="250" height="42" rx="10" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
      <rect x="0" y="0" width="250" height="42" rx="10" fill="none" stroke="url(#cyanGrad)" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="20" cy="21" r="4" fill="#00F2FE"/>
      <text x="135" y="26" text-anchor="middle" class="pill-text">Python • TensorFlow • FastAPI</text>
    </g>

    <g transform="translate(350, 452)">
      <rect width="250" height="42" rx="10" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
      <rect x="0" y="0" width="250" height="42" rx="10" fill="none" stroke="url(#pinkGrad)" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="20" cy="21" r="4" fill="#F107A3"/>
      <text x="135" y="26" text-anchor="middle" class="pill-text">Systems • Models • Research</text>
    </g>

    <g transform="translate(630, 452)">
      <rect width="250" height="42" rx="10" fill="url(#cardBg)" stroke="#334155" stroke-width="1"/>
      <rect x="0" y="0" width="250" height="42" rx="10" fill="none" stroke="url(#cyanGrad)" stroke-width="1" stroke-opacity="0.4"/>
      <circle cx="20" cy="21" r="4" fill="#00F2FE"/>
      <text x="135" y="26" text-anchor="middle" class="pill-text">Always Building</text>
    </g>
  </g>
</svg>
