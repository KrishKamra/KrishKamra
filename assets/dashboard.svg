<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">

<style>
  .label { fill: #00F7FF; font-family: monospace; font-size: 16px; }
  .value { fill: #FFFFFF; font-size: 24px; font-family: monospace; }
</style>

<!-- Background -->
<rect width="900" height="300" rx="20" fill="#0A192F"/>

<!-- Border -->
<rect x="5" y="5" width="890" height="290" rx="20" fill="none" stroke="#00F7FF" stroke-width="2"/>

<!-- Title -->
<text x="50%" y="40" text-anchor="middle" fill="#00F7FF" font-size="22" font-family="monospace">
AI SYSTEM DASHBOARD
</text>

<!-- Repos -->
<text x="200" y="130" text-anchor="middle" class="label">Projects</text>
<text x="200" y="170" text-anchor="middle" class="value">AI Systems</text>

<!-- Focus -->
<text x="450" y="130" text-anchor="middle" class="label">Focus</text>
<text x="450" y="170" text-anchor="middle" class="value">Machine Learning</text>

<!-- Status -->
<text x="700" y="130" text-anchor="middle" class="label">Status</text>
<text x="700" y="170" text-anchor="middle" class="value">Building</text>

<!-- Pulse -->
<circle cx="450" cy="230" r="8" fill="#FF00FF">
  <animate attributeName="r" values="8;14;8" dur="1.5s" repeatCount="indefinite"/>
</circle>

</svg>
