<svg width="950" height="520" viewBox="0 0 950 520" xmlns="http://www.w3.org/2000/svg">

<style>
.title{fill:#00F7FF;font-family:monospace;font-size:28px}
.label{fill:#9befff;font-family:monospace;font-size:15px}
.value{fill:white;font-family:monospace;font-size:24px;font-weight:bold}
.small{fill:#ff7af6;font-family:monospace;font-size:12px}
</style>

<defs>
<filter id="glow">
  <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
  <feMerge>
    <feMergeNode in="coloredBlur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

<radialGradient id="bg" cx="50%" cy="50%" r="70%">
<stop offset="0%" stop-color="#102544"/>
<stop offset="100%" stop-color="#081221"/>
</radialGradient>
</defs>

<!-- background -->
<rect width="950" height="520" rx="22" fill="url(#bg)"/>

<!-- border -->
<rect x="5" y="5" width="940" height="510" rx="22" fill="none" stroke="#00F7FF" stroke-width="2" filter="url(#glow)"/>

<!-- particles -->
<circle cx="80" cy="60" r="2" fill="#00F7FF">
<animate attributeName="cy" values="60;90;60" dur="4s" repeatCount="indefinite"/>
</circle>

<circle cx="880" cy="110" r="2" fill="#FF00FF">
<animate attributeName="cy" values="110;80;110" dur="5s" repeatCount="indefinite"/>
</circle>

<circle cx="140" cy="450" r="2" fill="#00F7FF">
<animate attributeName="cx" values="140;170;140" dur="6s" repeatCount="indefinite"/>
</circle>

<circle cx="820" cy="430" r="2" fill="#FF00FF">
<animate attributeName="cx" values="820;790;820" dur="6s" repeatCount="indefinite"/>
</circle>

<!-- title -->
<text x="475" y="45" text-anchor="middle" class="title">NEURAL AI SYSTEM</text>

<!-- data flow lines -->
<line x1="170" y1="180" x2="370" y2="130" stroke="#00F7FF" stroke-width="2"/>
<line x1="370" y1="130" x2="580" y2="180" stroke="#FF00FF" stroke-width="2"/>
<line x1="580" y1="180" x2="780" y2="130" stroke="#00F7FF" stroke-width="2"/>

<!-- moving pulse -->
<circle r="5" fill="#FF00FF">
<animateMotion dur="3s" repeatCount="indefinite"
path="M170 180 L370 130 L580 180 L780 130"/>
</circle>

<!-- NODE 1 -->
<circle cx="170" cy="180" r="55" fill="#0b1628" stroke="#00F7FF" stroke-width="3" filter="url(#glow)">
<animate attributeName="r" values="55;59;55" dur="2s" repeatCount="indefinite"/>
</circle>
<text x="170" y="170" text-anchor="middle" class="label">Projects</text>
<text x="170" y="200" text-anchor="middle" class="value">12+</text>

<!-- NODE 2 -->
<circle cx="370" cy="130" r="55" fill="#0b1628" stroke="#FF00FF" stroke-width="3" filter="url(#glow)">
<animate attributeName="r" values="55;60;55" dur="1.8s" repeatCount="indefinite"/>
</circle>
<text x="370" y="120" text-anchor="middle" class="label">Focus</text>
<text x="370" y="150" text-anchor="middle" class="value">AI/ML</text>

<!-- NODE 3 -->
<circle cx="580" cy="180" r="55" fill="#0b1628" stroke="#00F7FF" stroke-width="3" filter="url(#glow)">
<animate attributeName="r" values="55;58;55" dur="2.2s" repeatCount="indefinite"/>
</circle>
<text x="580" y="170" text-anchor="middle" class="label">Status</text>
<text x="580" y="200" text-anchor="middle" class="value">Learning</text>

<!-- NODE 4 -->
<circle cx="780" cy="130" r="55" fill="#0b1628" stroke="#FF00FF" stroke-width="3" filter="url(#glow)">
<animate attributeName="r" values="55;59;55" dur="1.7s" repeatCount="indefinite"/>
</circle>
<text x="780" y="120" text-anchor="middle" class="label">Mode</text>
<text x="780" y="150" text-anchor="middle" class="value">Build</text>

<!-- core -->
<circle cx="475" cy="360" r="34" fill="#FF00FF" filter="url(#glow)">
<animate attributeName="r" values="34;42;34" dur="1.5s" repeatCount="indefinite"/>
</circle>

<text x="475" y="365" text-anchor="middle" fill="white" font-size="13" font-family="monospace">CORE</text>
<text x="475" y="398" text-anchor="middle" class="small">Intelligence Engine Active</text>

<!-- core links -->
<line x1="170" y1="180" x2="475" y2="360" stroke="#00F7FF" stroke-width="1"/>
<line x1="370" y1="130" x2="475" y2="360" stroke="#FF00FF" stroke-width="1"/>
<line x1="580" y1="180" x2="475" y2="360" stroke="#00F7FF" stroke-width="1"/>
<line x1="780" y1="130" x2="475" y2="360" stroke="#FF00FF" stroke-width="1"/>

<!-- bottom panels -->
<rect x="80" y="435" width="240" height="48" rx="10" fill="#0f1b2d" stroke="#00F7FF"/>
<text x="200" y="465" text-anchor="middle" class="label">Python • TensorFlow • FastAPI</text>

<rect x="355" y="435" width="240" height="48" rx="10" fill="#0f1b2d" stroke="#FF00FF"/>
<text x="475" y="465" text-anchor="middle" class="label">Systems • Models • Research</text>

<rect x="630" y="435" width="240" height="48" rx="10" fill="#0f1b2d" stroke="#00F7FF"/>
<text x="750" y="465" text-anchor="middle" class="label">Always Building</text>

</svg>
